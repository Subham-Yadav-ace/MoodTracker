# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
#  MindMap – docker-compose.yml
#  Local / staging orchestration. For AWS production use ECS + ECR instead.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── MongoDB (LOCAL ONLY) ───────────────────────────────────────────────────
  # This service is NOT used in production — MongoDB Atlas is used instead.
  # Uncomment below only for local development without Atlas.
  # mongo:
  #   image: mongo:7.0
  #   container_name: mindmap-mongo
  #   restart: unless-stopped
  #   volumes:
  #     - mongo_data:/data/db
  #   environment:
  #     MONGO_INITDB_DATABASE: mindmap
  #   expose:
  #     - "27017"
  #   healthcheck:
  #     test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
  #     interval: 15s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 10s

  # ── Backend (Node / Express / Socket.io) ──────────────────────────────────
  backend:
    build:
      context: ./mindmap-backend
      dockerfile: Dockerfile
    container_name: mindmap-backend
    restart: unless-stopped
    env_file:
      - ./mindmap-backend/.env           # local only; use AWS Secrets Manager in prod
    environment:
      # MONGODB_URI comes from ./mindmap-backend/.env (MongoDB Atlas)
      # Do NOT override it here — the .env value will be used
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"
    # No depends_on needed — Atlas is an external cloud service
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend (React → Nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./mindmap-frontend
      dockerfile: Dockerfile
      args:
        # Pass your deployed backend URL so Vite bakes it into the bundle
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    container_name: mindmap-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

# volumes:
#   mongo_data:      # Only needed if using local mongo container
#     driver: local
